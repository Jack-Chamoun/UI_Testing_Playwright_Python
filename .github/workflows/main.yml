name: CI Pipeline - Pytest in Docker

on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mybuild .

      - name: Run tests
        run: |
          docker run \
            -v ${{ github.workspace }}:/app \
            mybuild

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/report.html
